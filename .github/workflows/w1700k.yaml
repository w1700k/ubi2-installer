name: W1700k UBI Installer (ARM) w custom payload

on:
  workflow_dispatch:

env:
  REMOTE_REPOSITORY: hurrian/openwrt-w1700k
  REMOTE_BRANCH: w1700k
  TARGET_SUBTARGET: airoha/an7581
  INNER_CONFIG: configs/w1700k.config
  OUTER_CONFIG: configs/minimal.config
  RECOVERY_IMAGE: openwrt-airoha-an7581-gemtek_w1700k-ubi-initramfs-recovery.itb
  SYSUPGRADE_IMAGE: openwrt-airoha-an7581-gemtek_w1700k-ubi-squashfs-sysupgrade.itb
  INSTALLER_IMAGE: openwrt-airoha-an7581-gemtek_w1700k-ubi-initramfs-installer.itb
  UBOOT_IMAGE: openwrt-airoha-an7581-gemtek_w1700k-ubi-chainload-uboot.itb

jobs:
  check_commits:
    name: Check Commits
    runs-on: ubuntu-24.04-arm
    outputs:
      latest_commit_sha: ${{ steps.get_sha.outputs.latest_commit_sha }}
    steps:
      - name: Checkout remote repository
        uses: actions/checkout@main
        with:
          repository: ${{ env.REMOTE_REPOSITORY }}
          ref: ${{ env.REMOTE_BRANCH }}

      - name: Get the latest commit SHA
        id: get_sha
        run: |
          echo "latest_commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "latest_commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build OpenWrt installer images
    needs: [check_commits]
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout installer repository
        uses: actions/checkout@main
        with:
          path: installer-repo

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc g++ gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget curl

      - name: Checkout OpenWrt repository
        uses: actions/checkout@main
        with:
          repository: ${{ env.REMOTE_REPOSITORY }}
          ref: ${{ env.REMOTE_BRANCH }}
          path: openwrt
          fetch-depth: 0

      - name: Use Github feeds
        run: |
          cd openwrt
          sed -i \
            -e 's#https://git.openwrt.org/feed/#https://github.com/openwrt/#g' \
            -e 's#https://git.openwrt.org/project/#https://github.com/openwrt/#g' \
            feeds.conf.default

      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare config (inner build)
        run: |
          cd openwrt
          cp "../installer-repo/${{ env.INNER_CONFIG }}" .config
          make defconfig

      - name: Build OpenWrt images (inner build)
        run: |
          cd openwrt
          make -j"$(nproc)" defconfig download world

      - name: Stage installer assets and add installer files (outer build only)
        run: |
          cd openwrt
          mkdir -p files/installer
          cp "bin/targets/${{ env.TARGET_SUBTARGET }}/${{ env.RECOVERY_IMAGE }}" "files/installer/"
          rsync -a ../installer-repo/files/ files/
          chmod +x \
            files/installer/install.sh \
            files/lib/preinit/00_installer

      - name: Prepare config (outer build)
        run: |
          cd openwrt
          cp "../installer-repo/${{ env.OUTER_CONFIG }}" .config
          make defconfig

      - name: Rebuild images with installer payload (outer build)
        run: |
          cd openwrt
          make -j"$(nproc)"

      - name: Collect artifacts
        run: |
          mkdir -p output/installer
          cp "openwrt/bin/targets/${{ env.TARGET_SUBTARGET }}/${{ env.RECOVERY_IMAGE }}" "output/installer/${{ env.INSTALLER_IMAGE }}"
          cp "openwrt/bin/targets/${{ env.TARGET_SUBTARGET }}/${{ env.UBOOT_IMAGE }}" "output/installer/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: w1700k-installer
          path: |
            output/installer/${{ env.INSTALLER_IMAGE }}
            output/installer/${{ env.UBOOT_IMAGE }}
